<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ring {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2;
      transform-origin: center;
      opacity: 0;
      animation: ripple 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    .ring-2 {
      animation-delay: 1s;
    }

    .dot {
      fill: #22c55e;
    }

    @keyframes ripple {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      100% {
        transform: scale(3.5);
        opacity: 0;
      }
    }
  </style>

  <circle class="ring ring-1" cx="50" cy="50" r="10" />
  <circle class="ring ring-2" cx="50" cy="50" r="10" />

  <circle class="dot" cx="50" cy="50" r="10" />
</svg>
